name: roomgenius_mobile
description: "A Flutter mobile app for AI-powered room redesign and interior concept generation."

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.16
  google_fonts: ^6.2.1
  flutter_bloc: ^9.1.1
  get_it: ^8.0.3
  json_serializable: ^6.9.0
  json_annotation: ^4.9.0
  dio: ^5.7.0
  build_runner: ^2.4.13
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1
  retrofit_generator: ^10.1.1
  logger: ^2.5.0
  go_router: ^16.3.0
  package_info_plus: ^8.0.0
  cached_network_image: ^3.2.3
  conditional_builder_null_safety: ^0.0.6
  fluttertoast: ^9.0.0
  sentry_flutter: ^9.7.0
  awesome_dio_interceptor: ^1.2.0
  upgrader: ^12.3.0
  flutter_flavorizr: ^2.2.3
  dartz: ^0.10.1
  oktoast: ^3.4.0
  loader_overlay: ^5.0.0
  flutter_spinkit: ^5.2.1
  auto_size_text: ^3.0.0
  awesome_dialog: ^3.3.0
  form_field_validator: ^1.1.0
  rename: ^3.1.0
  shimmer: ^3.0.0
  equatable: ^2.0.7
  image_picker: ^1.2.1 # Latest version for image/video picking
  file_picker: ^8.1.4 # For file selection with size/type validation
  dotted_border: ^3.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4
  image: ^4.1.3
  # ✅ Video Player Packages
  video_player: ^2.10.1 # Latest version
  chewie: ^1.12.1

  # ✅ Additional packages for better video experience
  wakelock_plus: ^1.3.2 # Keep screen awake during video
  screen_brightness: ^2.1.6
  volume_controller: ^3.4.0
  youtube_player_flutter: ^9.1.2
  youtube_player_iframe: ^5.2.2

  flutter_html: ^3.0.0

  # notifications and scheduling
  # permission_handler: ^12.0.1
  # flutter_local_notifications: ^19.5.0
  # timezone: ^0.10.1

  # Firebase services
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  firebase_messaging: ^16.0.3
  firebase_crashlytics: ^5.0.7
  firebase_analytics: ^12.1.2
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  google_sign_in: ^7.2.0
  pinput: ^6.0.1
  liquid_pull_to_refresh: ^3.0.1

  card_swiper: ^3.0.1
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  bloc_concurrency: ^0.3.0
  bloc: ^9.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  #intl_utils: ^2.8.7

flutter:
  # ✅ ADD THIS LINE - Enable code generation for intl
  generate: true

  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/branding/
    - assets/images/onboarding/
    - assets/icons/

  fonts:
    - family: Product Sans
      fonts:
        - asset: assets/fonts/Product_Sans_Regular.ttf
          weight: 400
        - asset: assets/fonts/Product_Sans_Bold.ttf
          weight: 700

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/branding/splash_logo1.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/branding/splash_logo1.png

flutter_native_splash:
  color: "#FFB78CFF"
  color_dark: "#FFB78CFF"
  android: true
  ios: true
  web: false
  fullscreen: true

  android_12:
    color: "#FFB78CFF"
    color_dark: "#FFB78CFF"
    

# ✅ Keep flutter_intl config
#flutter_intl:
#  enabled: true
